</head>

<body>
    <header class="navbar bg-dark border-bottom border-body p-3" data-bs-theme="dark">
        <a class="navbar-brand text-white">
            <h2>-AIRPLANE COMPANY-</h2>
        </a>

        <div class="btn-group">
            <button type="button" class="btn btn-info dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
                Go to
            </button>
            <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="index.HTML">Offers</a></li>

            </ul>
        </div>
    </header>

    <br>
    <h2>Credit Card Payment Form</h2>
    <form action="/submit_payment" method="post">
        <label for="cardholder_name">Name User</label>
        <input type="text" id="cardholder_name" name="cardholder_name" required><br><br>

        <label for="card_number">Number Card</label>
        <input type="text" id="card_number" name="card_number" maxlength="16" placeholder="XXXX XXXX XXXX XXXX"
            required><br><br>

        <label for="expiry_date">Date Card(MM/YY):</label>
        <input type="text" id="expiry_date" name="expiry_date" placeholder="MM/YY" required><br><br>

        <label for="cvv">Credit Code(CVV):</label>
        <input type="text" id="cvv" name="cvv" maxlength="3" placeholder="XXX" required><br><br>

        <button class="btn btn-success">Payment</button>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
